<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENTRIQ LOGISTICS | Elite Security & Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              navy: {
                DEFAULT: 'var(--navy-default)',
                dark: 'var(--navy-dark)',
                panel: 'var(--navy-panel)',
                accent: 'var(--navy-accent)'
              },
              main: 'var(--text-main)',
              muted: 'var(--text-muted)',
              apexRed: {
                DEFAULT: '#A61A1A',
                glow: 'var(--apex-glow)'
              },
              neonRed: {
                DEFAULT: '#FF0033',
                glow: 'var(--neon-glow)'
              }
            },
            boxShadow: {
              'premium-glow': '0 0 40px -10px var(--apex-glow)',
              'elevated-dark': '0 35px 70px -15px rgba(0, 0, 0, 0.8)',
              'elevated-light': '0 20px 50px -12px rgba(0, 0, 0, 0.1)',
              'apex': '0 0 30px var(--apex-glow)',
              'hud': 'inset 0 0 20px rgba(166, 26, 26, 0.1)'
            },
            fontFamily: {
              sans: ['Open Sans', 'sans-serif'],
              heading: ['Poppins', 'sans-serif']
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'scan': 'scan 3s linear infinite',
            },
            transitionTimingFunction: {
              'expo': 'cubic-bezier(0.22, 1, 0.36, 1)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --expo-out: cubic-bezier(0.22, 1, 0.36, 1);
        --navy-dark: #F8FAFC;
        --navy-default: #E5E7EB;
        --navy-panel: #FFFFFF;
        --navy-accent: #CBD5E1;
        --text-main: #020617;
        --text-muted: #64748B;
        --glass-bg: rgba(255, 255, 255, 0.75);
        --grid-color: rgba(0, 0, 0, 0.04);
        --apex-glow: rgba(166, 26, 26, 0.2);
        --neon-glow: rgba(255, 0, 51, 0.2);
      }
      .dark {
        --navy-dark: #020617;
        --navy-default: #0F172A;
        --navy-panel: #1E293B;
        --navy-accent: #172554;
        --text-main: #E2E8F0;
        --text-muted: #64748B;
        --glass-bg: rgba(15, 23, 42, 0.6);
        --grid-color: rgba(255, 255, 255, 0.02);
        --apex-glow: rgba(166, 26, 26, 0.4);
        --neon-glow: rgba(255, 0, 51, 0.4);
      }
      body {
        background-color: var(--navy-dark);
        color: var(--text-main);
        overflow-x: hidden;
        top: 0px !important; 
        transition: background-color 0.5s ease, color 0.5s ease;
      }
      .bg-grid {
        background-image: linear-gradient(var(--grid-color) 1px, transparent 1px),
                          linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .dark .glass {
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .text-gradient {
        background: linear-gradient(to bottom right, var(--text-main) 30%, var(--text-muted));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      @keyframes scan {
        0% { transform: translateY(-100%); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: translateY(100%); opacity: 0; }
      }
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
      
      /* Hide Google Translate completely */
      #google_translate_element, .goog-te-banner-frame, .goog-te-menu-frame, .goog-te-gadget, .goog-te-gadget-icon {
        display: none !important;
        visibility: hidden !important;
      }
      body { top: 0px !important; }
      .goog-tooltip { display: none !important; }
      .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #020617; }
      ::-webkit-scrollbar-thumb { background: #A61A1A; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #FF0033; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "react": "https://esm.sh/react@^19.2.3",
        "react/": "https://esm.sh/react@^19.2.3/",
        "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.48.1"
      }
    }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-grid antialiased">
    <div id="root"></div>
    <div id="google_translate_element"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
          new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
      } 
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
